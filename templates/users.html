<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 股票分析工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-secondary {
            background: white;
            color: #667eea;
        }
        .btn-secondary:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-item {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #667eea;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-admin {
            background: #667eea;
            color: white;
        }
        .badge-user {
            background: #28a745;
            color: white;
        }
        .badge-expired {
            background: #dc3545;
            color: white;
        }
        .badge-active {
            background: #28a745;
            color: white;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 用户管理</h1>
            <a href="/" class="btn btn-secondary">← 返回主页</a>
        </div>
        
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #667eea;">➕ 新增用户</h2>
            <div id="message"></div>
            <form id="addUserForm">
                <div class="form-row">
                    <div class="form-item">
                        <label>用户名</label>
                        <input type="text" id="newUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-item">
                        <label>密码</label>
                        <input type="password" id="newPassword" placeholder="请输入密码" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>有效期 (可选)</label>
                        <input type="date" id="newExpiryDate">
                    </div>
                    <div class="form-item">
                        <label>备注</label>
                        <input type="text" id="newRemark" placeholder="备注信息">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: auto;">添加用户</button>
            </form>
        </div>
        
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #667eea;">📋 用户列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>有效期</th>
                        <th>状态</th>
                        <th>备注</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        function loadUsers() {
            fetch('/api/users')
                .then(res => res.json())
                .then(users => {
                    const tbody = document.getElementById('userTableBody');
                    tbody.innerHTML = users.map(user => {
                        const isExpired = !user.is_admin && user.expiry_date && new Date(user.expiry_date) < new Date();
                        const statusClass = isExpired ? 'badge-expired' : 'badge-active';
                        const statusText = isExpired ? '已过期' : '有效';
                        const roleClass = user.is_admin ? 'badge-admin' : 'badge-user';
                        const roleText = user.is_admin ? '管理员' : '普通用户';
                        
                        let expiryText = '永久';
                        if (user.expiry_date) {
                            expiryText = new Date(user.expiry_date).toLocaleDateString('zh-CN');
                        }
                        
                        let deleteBtn = '';
                        if (!user.is_admin) {
                            deleteBtn = `<button class="btn btn-danger" onclick="deleteUser('${user.username}')">删除</button>`;
                        }
                        
                        return `
                            <tr>
                                <td>${user.username}</td>
                                <td><span class="badge ${roleClass}">${roleText}</span></td>
                                <td>${expiryText}</td>
                                <td><span class="badge ${statusClass}">${statusText}</span></td>
                                <td>${user.remark || '-'}</td>
                                <td>${new Date(user.created_at).toLocaleString('zh-CN')}</td>
                                <td>${deleteBtn}</td>
                            </tr>
                        `;
                    }).join('');
                });
        }
        
        function showMessage(text, isError = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = isError ? 'error' : 'success';
            msgDiv.textContent = text;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        document.getElementById('addUserForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const expiryDate = document.getElementById('newExpiryDate').value;
            const remark = document.getElementById('newRemark').value;
            
            fetch('/api/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    password,
                    expiry_date: expiryDate || null,
                    remark
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showMessage(data.error, true);
                } else {
                    showMessage('用户添加成功！');
                    document.getElementById('addUserForm').reset();
                    loadUsers();
                }
            })
            .catch(err => {
                showMessage('添加失败: ' + err.message, true);
            });
        });
        
        function deleteUser(username) {
            if (!confirm('确定要删除用户 "' + username + '" 吗？')) {
                return;
            }
            
            fetch('/api/users', {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    showMessage(data.error, true);
                } else {
                    showMessage('用户删除成功！');
                    loadUsers();
                }
            })
            .catch(err => {
                showMessage('删除失败: ' + err.message, true);
            });
        }
        
        loadUsers();
    </script>
</body>
</html>
